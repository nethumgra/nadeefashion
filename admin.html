<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadee Fashion - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Poppins:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .sidebar-link {
            transition: background-color 0.2s, color 0.2s;
        }

        .sidebar-link-active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body {
            scrollbar-gutter: stable;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-new {
            background-color: #f59e0b;
            color: white;
        }

        .status-confirmed {
            background-color: #22c55e;
            color: white;
        }

        .status-rejected {
            background-color: #ef4444;
            color: white;
        }

        .modal {
            transition: opacity 0.3s ease;
        }

        .modal-content {
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#F5F5F3] font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-[260px] bg-[#2A2B2F] text-gray-300 flex flex-col flex-shrink-0 z-20 shadow-xl">
            <div class="p-6 flex flex-col items-center justify-center border-b border-gray-700/50 mt-4 mb-2">
                <div class="flex items-center gap-2 mb-2 text-[#CD8F82]">
                    <span class="text-4xl font-black font-['Outfit',sans-serif]">NF</span>
                </div>
                <div class="text-white text-lg font-bold tracking-widest font-['Outfit',sans-serif]">Nadee Fashion</div>
            </div>
            <nav class="flex-1 px-4 py-2 space-y-1.5 overflow-y-auto">
                <a href="#dashboard"
                    class="sidebar-link sidebar-link-active flex items-center py-3 px-4 rounded-xl hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    Dashboard
                </a>
                <a href="#orders"
                    class="sidebar-link flex items-center py-3 px-4 rounded-xl hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01">
                        </path>
                    </svg>
                    Orders
                </a>
                <a href="#products"
                    class="sidebar-link flex items-center py-3 px-4 rounded-xl hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Products
                </a>
                <a href="#categories"
                    class="sidebar-link flex items-center py-3 px-4 rounded-xl hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                    </svg>
                    Categories
                </a>
                <a href="#settings"
                    class="sidebar-link flex items-center py-3 px-4 rounded-xl hover:bg-white/5 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Settings
                </a>
                <div class="mt-8 pt-4 border-t border-gray-700/50">
                    <button id="admin-logout-btn"
                        class="w-full text-left flex items-center py-3 px-4 rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                        Logout
                    </button>
                </div>
            </nav>
        </aside>

        <main id="main-content" class="flex-1 p-8 lg:p-10 overflow-y-auto relative z-10">
        </main>
    </div>

    <div id="order-details-modal"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden modal">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto modal-content">
            <div class="p-6 relative">
                <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
                <div id="modal-order-details">
                    <p>Loading details...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-product-modal"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden modal">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl max-h-[95vh] overflow-y-auto modal-content">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Product</h2>
                <form id="editProductForm" class="space-y-6">
                    <input type="hidden" id="editProductId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="editProductName" class="block text-sm font-medium text-gray-700">Product
                                Name</label>
                            <input type="text" id="editProductName" required
                                class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500">
                        </div>
                        <div>
                            <label for="editProductPrice" class="block text-sm font-medium text-gray-700">Price
                                (Rs.)</label>
                            <input type="number" id="editProductPrice" required
                                class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500">
                        </div>
                    </div>
                    <div>
                        <label for="editProductDescription"
                            class="block text-sm font-medium text-gray-700">Description</label>
                        <textarea id="editProductDescription" rows="4"
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Main Image</label>
                            <div class="mt-2 flex items-center gap-4">
                                <img id="editProductImagePreview" src="https://placehold.co/100x100?text=Image"
                                    class="w-24 h-24 object-cover rounded-md bg-gray-100">
                                <input type="hidden" id="currentImageUrl">
                                <div>
                                    <label for="editProductImageFile"
                                        class="cursor-pointer bg-white py-2 px-3 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Change</label>
                                    <input type="file" id="editProductImageFile" class="sr-only">
                                    <p id="editFileStatus" class="text-xs text-gray-500 mt-1">Select a new file.</p>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Hover Image</label>
                            <div class="mt-2 flex items-center gap-4">
                                <img id="editProductImagePreview2" src="https://placehold.co/100x100?text=Hover"
                                    class="w-24 h-24 object-cover rounded-md bg-gray-100">
                                <input type="hidden" id="currentImageUrl2">
                                <div>
                                    <label for="editProductImageFile2"
                                        class="cursor-pointer bg-white py-2 px-3 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Change</label>
                                    <input type="file" id="editProductImageFile2" class="sr-only">
                                    <p id="editFileStatus2" class="text-xs text-gray-500 mt-1">Select a new file.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label for="editProductCategory"
                            class="block text-sm font-medium text-gray-700">Category</label>
                        <select id="editProductCategory"
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-teal-500 focus:border-teal-500">
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Manage Stock Status</label>
                        <div id="edit-sizes-container" class="mt-2 space-y-2">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Manage Colors</label>
                        <div id="edit-colors-container" class="mt-2 space-y-2">
                        </div>
                        <button type="button" id="btn-edit-add-color-row"
                            class="mt-2 text-sm text-teal-600 font-semibold hover:underline">+ Add Color</button>
                    </div>
                    <div class="text-right pt-4 space-x-3">
                        <button type="button" id="cancel-edit-product-btn"
                            class="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Cancel</button>
                        <button type="submit"
                            class="py-2 px-6 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700">Update
                            Product</button>
                    </div>
                    <div id="editStatusMessage" class="mt-4 text-center font-medium"></div>
                </form>
            </div>
        </div>
    </div>

    <div id="edit-category-modal"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden modal">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-xl max-h-[95vh] overflow-y-auto modal-content">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Category</h2>
                <form id="editCategoryForm" class="space-y-6">
                    <input type="hidden" id="editCategoryId">
                    <div>
                        <label for="editCategoryName" class="block text-sm font-medium text-gray-700">Category
                            Name</label>
                        <input type="text" id="editCategoryName" readonly
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md bg-gray-100 text-gray-600 cursor-not-allowed">
                        <p class="text-xs text-gray-500 mt-1">Category name cannot be changed here.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category Logo</label>
                        <div class="mt-2 flex items-center gap-4">
                            <img id="editCategoryLogoPreview" src="https://placehold.co/100x100?text=Logo"
                                class="w-24 h-24 object-cover rounded-md bg-gray-100">
                            <input type="hidden" id="currentCategoryLogoUrl">
                            <div>
                                <label for="editCategoryLogoFile"
                                    class="cursor-pointer bg-white py-2 px-3 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Change
                                    Logo</label>
                                <input type="file" id="editCategoryLogoFile" class="sr-only" accept="image/*">
                                <p id="editCategoryLogoStatus" class="text-xs text-gray-500 mt-1">Select a new file.</p>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category Banner (Optional)</label>
                        <div class="mt-2 flex items-center gap-4">
                            <img id="editCategoryBannerPreview" src="https://placehold.co/300x100?text=Banner"
                                class="w-full h-24 object-cover rounded-md bg-gray-100">
                            <input type="hidden" id="currentCategoryBannerUrl">
                            <div>
                                <label for="editCategoryBannerFile"
                                    class="cursor-pointer bg-white py-2 px-3 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 flex-shrink-0">Change
                                    Banner</label>
                                <input type="file" id="editCategoryBannerFile" class="sr-only" accept="image/*">
                                <p id="editCategoryBannerStatus" class="text-xs text-gray-500 mt-1">Select a new file.
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="text-right pt-4 space-x-3">
                        <button type="button" id="cancel-edit-category-btn"
                            class="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Cancel</button>
                        <button type="submit"
                            class="py-2 px-6 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700">Update
                            Category</button>
                    </div>
                    <div id="editCategoryStatusMessage" class="mt-4 text-center font-medium"></div>
                </form>
            </div>
        </div>
    </div>


    <script type="module">
        // Import from the config file
        import { db, uploadImageToImgBB, auth } from './firebase-config.js';
        // Import necessary Firestore functions
        import { collection, getDocs, addDoc, serverTimestamp, query, orderBy, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- CONFIG AND INITIALIZATION ---
        const MASTER_SIZES = ['XS', 'S', 'M', 'L', 'XL', 'XXL', '30', '32', '34', '36', '38', '40'];
        let salesChartInstance;
        let orderStatusChartInstance;

        // --- CORE LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            if (!db) {
                document.getElementById('main-content').innerHTML = `<div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4" role="alert"><p class="font-bold">Database Connection Failed</p><p>Check if firebase-config.js is correct and linked properly.</p></div>`;
                return;
            }

            document.getElementById('main-content').addEventListener('click', handleMainContentClick);
            document.getElementById('admin-logout-btn')?.addEventListener('click', () => {
                signOut(auth);
            });

            document.addEventListener('click', (e) => {
                if (e.target.id === 'btn-add-color-row' || e.target.id === 'btn-edit-add-color-row') {
                    const containerId = e.target.id === 'btn-add-color-row' ? 'add-colors-container' : 'edit-colors-container';
                    const container = document.getElementById(containerId);
                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-2 color-add-entry';
                    row.innerHTML = `
                        <input type="color" class="w-10 h-10 border rounded-md cursor-pointer color-hex" value="#000000">
                        <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-md color-name" placeholder="Color Name (e.g., Black)" required>
                        <button type="button" class="text-red-500 hover:text-red-700 remove-color-btn">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    `;
                    container.appendChild(row);
                }

                const removeBtn = e.target.closest('.remove-color-btn');
                if (removeBtn) {
                    removeBtn.closest('.color-add-entry').remove();
                }
            });

            ['order-details-modal', 'edit-product-modal', 'edit-category-modal'].forEach(modalId => {
                document.getElementById(modalId)?.addEventListener('click', (e) => {
                    if (e.target.id === modalId || e.target.closest('#close-modal-btn, #cancel-edit-product-btn, #cancel-edit-category-btn')) {
                        document.getElementById(modalId).classList.add('hidden');
                    }
                });
            });

            document.getElementById('editProductForm').addEventListener('submit', handleEditProductSubmit);
            document.getElementById('editProductImageFile').addEventListener('change', (e) => {
                document.getElementById('editFileStatus').textContent = e.target.files[0] ? e.target.files[0].name : 'Select a new file...';
            });
            document.getElementById('editProductImageFile2').addEventListener('change', (e) => {
                document.getElementById('editFileStatus2').textContent = e.target.files[0] ? e.target.files[0].name : 'Select a new file...';
            });
            document.getElementById('editCategoryForm').addEventListener('submit', handleEditCategorySubmit);
            document.getElementById('editCategoryLogoFile').addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    document.getElementById('editCategoryLogoStatus').textContent = e.target.files[0].name;
                    document.getElementById('editCategoryLogoPreview').src = URL.createObjectURL(e.target.files[0]);
                }
            });
            document.getElementById('editCategoryBannerFile').addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    document.getElementById('editCategoryBannerStatus').textContent = e.target.files[0].name;
                    document.getElementById('editCategoryBannerPreview').src = URL.createObjectURL(e.target.files[0]);
                }
            });

            onAuthStateChanged(auth, (user) => {
                const sidebar = document.querySelector('aside');
                if (!user || user.email !== 'admin@gmail.com') {
                    sidebar.classList.add('hidden');
                    document.getElementById('main-content').innerHTML = `
                        <div class="fixed inset-0 flex items-center justify-center bg-[#F4F2F0] z-50">
                            <div class="max-w-[400px] w-full bg-white p-10 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.08)] relative z-10 flex flex-col">
                                <div class="text-center mb-6">
                                    <div class="flex items-center justify-center gap-2 mb-2 text-[#CD8F82]">
                                        <span class="text-5xl font-black font-['Outfit',sans-serif]">NF</span>
                                    </div>
                                    <h2 class="text-2xl font-bold tracking-widest text-gray-900 mb-1 font-['Outfit',sans-serif]">Nadee Fashion</h2>
                                    <p class="text-gray-500 text-sm mb-1">Admin Login</p>
                                    <p class="text-xs text-gray-400">International Administrator Portal</p>
                                    <p class="text-[10px] text-gray-400 mt-1">المدير | 操作员 | भावी दी</p>
                                </div>
                                <form id="admin-login-form" class="space-y-5">
                                    <div>
                                        <label class="block text-xs font-medium text-gray-500 mb-1 pl-1">Email Address</label>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                            </div>
                                            <input type="email" id="admin-email" value="admin@gmail.com" readonly class="block w-full pl-10 pr-3 py-2.5 border-0 bg-[#F0F4FA] rounded-xl text-gray-600 text-sm focus:ring-2 focus:ring-[#935248] outline-none transition-shadow">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-500 mb-1 pl-1">Password</label>
                                        <div class="relative">
                                            <input type="password" id="admin-password" required class="block w-full pl-3 pr-10 py-2.5 border-0 bg-[#F0F4FA] rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-[#935248] outline-none transition-shadow" placeholder="••••••••">
                                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-400 hover:text-gray-600" onclick="const p = document.getElementById('admin-password'); p.type = p.type === 'password' ? 'text' : 'password';">
                                                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                            </div>
                                        </div>
                                        <div class="text-right mt-2">
                                            <a href="#" class="text-[11px] text-gray-400 hover:text-gray-600">Forgot Password?</a>
                                        </div>
                                    </div>
                                    <button type="submit" id="admin-login-btn" class="w-full py-3 px-4 rounded-xl text-sm font-medium text-white bg-gradient-to-r from-[#935248] to-[#CD8F82] hover:opacity-90 transition-opacity shadow-md mt-2">
                                        Login to Dashboard
                                    </button>
                                    <div id="admin-login-error" class="text-red-500 text-xs mt-2 text-center hidden"></div>
                                </form>
                            </div>

                    name: entry.querySelector('.color-name').value.trim()
                })).filter(c => c.name);

                const updatedData = {
                    name: document.getElementById('editProductName').value,
                    price: parseFloat(document.getElementById('editProductPrice').value),
                    description: document.getElementById('editProductDescription').value,
                    category: document.getElementById('editProductCategory').value,
                    imageUrls: [imageUrl1, imageUrl2].filter(url => url),
                    imageUrl: imageUrl1,
                    sizes: sizes,
                    colors: colors
                };

                await updateDoc(doc(db, "products", productId), updatedData);
                statusMsg.textContent = 'Product updated successfully!'; statusMsg.style.color = 'green';
                await populateProductsTable();
                setTimeout(() => { document.getElementById('edit-product-modal').classList.add('hidden'); }, 1500);

            } catch (error) {
                console.error("Error updating product: ", error);
                statusMsg.textContent = `Error: ${error.message}`; statusMsg.style.color = 'red';
            }
        }

        async function openEditCategoryModal(categoryId) {
            const modal = document.getElementById('edit-category-modal');
            const statusMsg = document.getElementById('editCategoryStatusMessage');
            statusMsg.textContent = '';

            try {
                const categoryDoc = await getDoc(doc(db, "categories", categoryId));
                if (!categoryDoc.exists()) {
                    alert("Category not found!");
                    return;
                }
                const data = categoryDoc.data();

                document.getElementById('editCategoryId').value = categoryDoc.id;
                document.getElementById('editCategoryName').value = data.name || categoryDoc.id;

                const logoUrl = data.logoUrl || data.imageUrl || '';
                const bannerUrl = data.bannerUrl || '';

                document.getElementById('editCategoryLogoPreview').src = logoUrl || 'https://placehold.co/100x100?text=No+Logo';
                document.getElementById('currentCategoryLogoUrl').value = logoUrl;
                document.getElementById('editCategoryLogoFile').value = '';
                document.getElementById('editCategoryLogoStatus').textContent = 'Select a new file...';

                document.getElementById('editCategoryBannerPreview').src = bannerUrl || 'https://placehold.co/300x100?text=No+Banner';
                document.getElementById('currentCategoryBannerUrl').value = bannerUrl;
                document.getElementById('editCategoryBannerFile').value = '';
                document.getElementById('editCategoryBannerStatus').textContent = 'Select a new file...';

                modal.classList.remove('hidden');
            } catch (error) {
                console.error("Error fetching category for edit:", error);
                alert("Could not load category details.");
            }
        }

        async function handleEditCategorySubmit(e) {
            e.preventDefault();
            const statusMsg = document.getElementById('editCategoryStatusMessage');
            statusMsg.textContent = 'Updating...'; statusMsg.style.color = 'blue';

            const categoryId = document.getElementById('editCategoryId').value;
            const logoFile = document.getElementById('editCategoryLogoFile').files[0];
            const bannerFile = document.getElementById('editCategoryBannerFile').files[0];

            let logoUrl = document.getElementById('currentCategoryLogoUrl').value;
            let bannerUrl = document.getElementById('currentCategoryBannerUrl').value;

            try {
                if (logoFile) {
                    statusMsg.textContent = 'Uploading logo image...';
                    logoUrl = await uploadImageToImgBB(logoFile);
                }
                if (bannerFile) {
                    statusMsg.textContent = 'Uploading banner image...';
                    bannerUrl = await uploadImageToImgBB(bannerFile);
                }

                const updatedData = {};
                if (logoUrl && !logoUrl.includes('placehold.co')) {
                    updatedData.logoUrl = logoUrl;
                    updatedData.imageUrl = logoUrl; // For backward compatibility
                }
                if (bannerUrl && !bannerUrl.includes('placehold.co')) {
                    updatedData.bannerUrl = bannerUrl;
                }

                if (Object.keys(updatedData).length > 0) {
                    await updateDoc(doc(db, "categories", categoryId), updatedData);
                }
                statusMsg.textContent = 'Category updated successfully!'; statusMsg.style.color = 'green';
                await populateCategoriesTable();
                setTimeout(() => { document.getElementById('edit-category-modal').classList.add('hidden'); }, 1500);

            } catch (error) {
                console.error("Error updating category: ", error);
                statusMsg.textContent = `Error: ${error.message}`; statusMsg.style.color = 'red';
            }
        }

        async function handleMainContentClick(e) {
            const target = e.target;

            if (target.id === 'show-add-product-form-btn') document.getElementById('add-product-container').classList.remove('hidden');
            if (target.id === 'cancel-add-product-btn') document.getElementById('add-product-container').classList.add('hidden');
            if (target.closest('form')?.id === 'addProductForm' && target.type === 'submit') {
                e.preventDefault();
                const form = target.closest('form'); const statusMsg = document.getElementById('statusMessage');
                statusMsg.textContent = 'Adding...'; statusMsg.style.color = 'blue';

                const imageFile1 = form.productImageFile.files[0];
                const imageFile2 = form.productImageFile2.files[0];

                if (!imageFile1) {
                    statusMsg.textContent = 'Please select a main image file.'; statusMsg.style.color = 'red'; return;
                }

                try {
                    const selectedSizes = Array.from(form.querySelectorAll('input[name="sizes"]:checked'));
                    if (selectedSizes.length === 0) {
                        statusMsg.textContent = 'Please select at least one available size.'; statusMsg.style.color = 'red'; return;
                    }

                    statusMsg.textContent = 'Uploading main image...';
                    const imageUrl1 = await uploadImageToImgBB(imageFile1);
                    let imageUrl2 = '';
                    if (imageFile2) {
                        statusMsg.textContent = 'Uploading hover image...';
                        imageUrl2 = await uploadImageToImgBB(imageFile2);
                    }

                    statusMsg.textContent = 'Processing data...';
                    const sizes = selectedSizes.map(checkbox => ({ size: checkbox.value, stock: 'In Stock' }));

                    const colorEntries = Array.from(document.querySelectorAll('#add-colors-container .color-add-entry'));
                    const colors = colorEntries.map(entry => ({
                        hex: entry.querySelector('.color-hex').value,
                        name: entry.querySelector('.color-name').value.trim()
                    })).filter(c => c.name);

                    const productData = {
                        name: form.productName.value,
                        price: parseFloat(form.productPrice.value),
                        description: form.productDescription.value,
                        category: form.productCategory.value,
                        imageUrls: [imageUrl1, imageUrl2].filter(url => url),
                        imageUrl: imageUrl1,
                        sizes: sizes,
                        colors: colors,
                        createdAt: serverTimestamp()
                    };

                    await addDoc(collection(db, "products"), productData);
                    statusMsg.textContent = 'Success!'; statusMsg.style.color = 'green';
                    form.reset();
                    document.getElementById('add-product-container').classList.add('hidden');
                    await populateProductsTable();
                } catch (error) {
                    statusMsg.textContent = `Error: ${error.message}`;
                    statusMsg.style.color = 'red';
                }
            }

            if (target.classList.contains('edit-btn')) {
                openEditProductModal(target.dataset.id);
            }
            if (target.classList.contains('delete-btn')) {
                const productId = target.dataset.id;
                if (confirm('Are you sure you want to delete this product?')) { await deleteDoc(doc(db, "products", productId)); await populateProductsTable(); }
            }
            if (target.classList.contains('edit-category-btn')) {
                openEditCategoryModal(target.dataset.id);
            }
            if (target.classList.contains('delete-category-btn')) {
                const categoryId = target.dataset.id;
                if (confirm(`Are you sure you want to delete the category "${categoryId}"? This cannot be undone.`)) {
                    await deleteDoc(doc(db, "categories", categoryId));
                    await populateCategoriesTable();
                }
            }

            if (target.classList.contains('confirm-btn') || target.classList.contains('reject-btn')) {
                const orderId = target.dataset.id; target.disabled = true; target.textContent = '...';
                const orderRef = doc(db, "orders", orderId); const newStatus = target.classList.contains('confirm-btn') ? 'Confirmed' : 'Rejected';
                try {
                    await updateDoc(orderRef, { status: newStatus });
                    if (newStatus === 'Confirmed') {
                        const orderDoc = await getDoc(orderRef);
                        if (orderDoc.exists() && orderDoc.data().customer.email) { await addDoc(collection(db, "mail"), { to: [orderDoc.data().customer.email], message: { subject: `Your Order #${orderId.substring(0, 6)} is Confirmed!`, html: createEmailHtml(orderDoc.data(), orderId) } }); }
                    }
                    const orderCard = document.getElementById(orderId);
                    if (orderCard) {
                        orderCard.querySelector('.status-badge').textContent = newStatus;
                        orderCard.querySelector('.status-badge').className = `status-badge ${newStatus === 'Confirmed' ? 'status-confirmed' : 'status-rejected'}`;
                        orderCard.querySelector('.action-buttons').innerHTML = '';
                    }
                } catch (error) { console.error("Error updating order:", error); alert("Failed to update order status."); target.disabled = false; target.textContent = newStatus === 'Confirmed' ? 'Confirm' : 'Reject'; }
            }
            const orderCard = target.closest('.order-card-clickable');
            if (orderCard && !target.closest('button')) {
                showOrderDetailsModal(orderCard.id);
            }
        }

        // --- CHART RENDERING ---
        function renderSalesChart(ordersData) {
            const ctx = document.getElementById('salesChart')?.getContext('2d'); if (!ctx) return; const last7Days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0]; }).reverse(); const salesData = last7Days.map(day => ordersData.filter(o => o.timestamp?.toDate().toISOString().split('T')[0] === day).reduce((sum, o) => sum + (o.payment?.total || 0), 0)); if (salesChartInstance) salesChartInstance.destroy(); salesChartInstance = new Chart(ctx, { type: 'bar', data: { labels: last7Days, datasets: [{ label: 'Sales (Rs.)', data: salesData, backgroundColor: 'rgba(13, 148, 136, 0.6)' }] }, options: { scales: { y: { beginAtZero: true } } } });
        }
        function renderOrderStatusChart(ordersData) {
            const ctx = document.getElementById('orderStatusChart')?.getContext('2d'); if (!ctx) return; const statusCounts = ordersData.reduce((acc, order) => { const status = order.status || 'Unknown'; acc[status] = (acc[status] || 0) + 1; return acc; }, {}); if (orderStatusChartInstance) orderStatusChartInstance.destroy(); orderStatusChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(statusCounts), datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#f59e0b', '#22c55e', '#ef4444', '#3b82f6', '#6b7280'] }] } });
        }

    </script>
