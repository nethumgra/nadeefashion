<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preloader Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #f8f9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
        }

        #kw-preloader {
            position: fixed;
            inset: 0;
            background: #f8f9fc;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }

        .kw-symbols-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .kw-symbol {
            width: 38px;
            height: 38px;
            position: relative;
        }

        .kw-shape-bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.05);
            stroke-width: 6;
            stroke-linejoin: round;
        }

        .kw-shape-arc {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform-origin: 50px 50px;
        }

        .kw-shape-rose {
            stroke: #8A3A54; /* Dark Rose */
        }

        .kw-shape-black {
            stroke: #000000; /* Black */
        }

        .kw-anim-cw {
            animation: spinClockwise 1.5s linear infinite;
        }

        .kw-anim-ccw {
            animation: spinCounterClockwise 1.5s linear infinite;
        }

        .kw-arc-triangle { stroke-dasharray: 230; stroke-dashoffset: 70; }
        .kw-arc-circle { stroke-dasharray: 220; stroke-dashoffset: 70; }
        .kw-arc-square { stroke-dasharray: 280; stroke-dashoffset: 90; }

        .kw-brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #8A3A54; /* Dark Rose */
            letter-spacing: 3px;
            opacity: 0;
            transform: translateY(15px);
            animation: textReveal 0.8s ease 1.2s forwards;
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spinClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

    <div id="kw-preloader">
        <div class="kw-symbols-container">
            <!-- Left: Triangle (Dark Rose) -->
            <div class="kw-symbol">
                <svg viewBox="0 0 100 100" style="overflow: visible;">
                    <polygon points="50,15 85,85 15,85" class="kw-shape-bg" />
                    <polygon points="50,15 85,85 15,85" class="kw-shape-arc kw-shape-rose kw-arc-triangle kw-anim-cw" />
                </svg>
            </div>
            <!-- Center: Circle (Black) -->
            <div class="kw-symbol">
                <svg viewBox="0 0 100 100" style="overflow: visible;">
                    <circle cx="50" cy="50" r="35" class="kw-shape-bg" />
                    <circle cx="50" cy="50" r="35" class="kw-shape-arc kw-shape-black kw-arc-circle kw-anim-ccw" />
                </svg>
            </div>
            <!-- Right: Square (Dark Rose) -->
            <div class="kw-symbol">
                <svg viewBox="0 0 100 100" style="overflow: visible;">
                    <rect x="15" y="15" width="70" height="70" class="kw-shape-bg" />
                    <rect x="15" y="15" width="70" height="70" class="kw-shape-arc kw-shape-rose kw-arc-square kw-anim-cw" />
                </svg>
            </div>
        </div>
        <div class="kw-brand-text">Lovzmart</div>
    </div>
</body>
</html>
