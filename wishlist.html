<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Nadee Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <script src="components/header.js"></script>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-[1920px] xl:px-12 mx-auto px-4 py-8">
        <h1 class="text-3xl md:text-4xl font-black text-gray-900 mb-8 tracking-tight">Your Wishlist</h1>

        <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-10">
            <!-- Wishlist items will be injected here by JS -->
            <p id="wishlist-loading" class="col-span-full text-center text-gray-500">Loading your wishlist...</p>
        </div>
    </main>

    <script src="components/modals.js"></script>
    <script src="components/footer.js"></script>

    <!-- JAVASCRIPT LOGIC -->
    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const wishlistGrid = document.getElementById('wishlist-grid');
        const wishlistLoading = document.getElementById('wishlist-loading');
        
        let wishlistUnsubscribe = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadWishlist(user.uid);
            } else {
                if (wishlistUnsubscribe) wishlistUnsubscribe();
                wishlistGrid.innerHTML = `
                    <div class="col-span-full bg-white p-8 rounded-lg shadow-md text-center">
                        <h2 class="text-xl font-semibold mb-2">Your wishlist is empty!</h2>
                        <p class="text-gray-600 mb-4">Please log in to see your saved items.</p>
                        <button onclick="document.getElementById('auth-modal').classList.remove('hidden')" class="bg-black text-white font-bold py-3 px-6 rounded-md hover:bg-gray-800 transition shadow-sm">
                            Login & Continue Shopping
                        </button>
                    </div>
                `;
                wishlistLoading.classList.add('hidden');
            }
        });

        function loadWishlist(userId) {
            const wishlistRef = collection(db, 'wishlists', userId, 'items');

            wishlistUnsubscribe = onSnapshot(wishlistRef, (snapshot) => {
                wishlistLoading.classList.add('hidden');

                if (snapshot.empty) {
                    wishlistGrid.innerHTML = `
                         <div class="col-span-full bg-white p-8 rounded-lg shadow-md text-center">
                            <h2 class="text-xl font-semibold mb-2">Your wishlist is empty!</h2>
                            <p class="text-gray-600 mb-4">You haven't saved any items yet.</p>
                            <a href="index.html" class="inline-block bg-black text-white font-bold py-3 px-6 rounded-md hover:bg-gray-800 transition shadow-sm">
                                Discover Products
                            </a>
                        </div>
                    `;
                    return;
                }

                wishlistGrid.innerHTML = ''; 

                snapshot.docs.forEach(docSnap => {
                    const item = docSnap.data();
                    const itemElement = createWishlistItemElement(docSnap.id, item);
                    wishlistGrid.appendChild(itemElement);
                });

            }, (error) => {
                console.error("Error loading wishlist:", error);
                wishlistLoading.textContent = "Could not load your wishlist. Please try again.";
            });
        }

        function createWishlistItemElement(itemId, item) {
            const div = document.createElement('div');
            div.className = 'group';

            const displayImage = item.imageUrl || 'https://placehold.co/400x500/f0f0f0/666?text=No+Image';

            div.innerHTML = `
                <div class="relative overflow-hidden rounded-lg bg-gray-100">
                    <a href="product-detail.html?id=${itemId}">
                        <img src="${displayImage}" alt="${item.name}" class="w-full aspect-[3/4] object-cover object-center group-hover:scale-105 transition-transform duration-300">
                    </a>
                    <button class="remove-wishlist-item absolute top-3 right-3 bg-white/90 backdrop-blur-sm rounded-full p-2 text-gray-500 hover:text-red-500 transition-colors shadow-sm" data-id="${itemId}">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
                <div class="mt-3 px-1">
                    <a href="product-detail.html?id=${itemId}" class="text-sm text-black font-semibold hover:text-gray-700 transition-colors">${item.name}</a>
                    <p class="text-xs text-gray-500 mt-0.5 mb-1">${item.brand || 'Nadee Fashion'}</p>
                    <p class="text-md font-bold text-gray-900">Rs. ${item.price ? item.price.toLocaleString() : '0'}</p>
                </div>
            `;

            div.querySelector('.remove-wishlist-item').addEventListener('click', async (e) => {
                const docId = e.currentTarget.getAttribute('data-id');
                const userId = auth.currentUser.uid;
                if (!userId) return;
                
                try {
                    await deleteDoc(doc(db, 'wishlists', userId, 'items', docId));
                } catch(error) {
                    console.error("Error removing item from wishlist:", error);
                    alert("Could not remove item. Please try again.");
                }
            });

            return div;
        }
    </script>
</body>
</html>
