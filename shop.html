    <style>
      /* Applying Poppins Font to the entire site */
      body {
        font-family: "Poppins", sans-serif;
      }

      .sidebar-panel {
        transition: transform 0.3s ease-in-out;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 5px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: grid;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Style to handle the scroll locking */
      .no-scroll {
        overflow: hidden;
      }

      /* Swiper Pagination color */
      .swiper-pagination-bullet-active {
        background-color: var(--primary);
      }

      /* Ensure Poppins is applied to all elements */
      * {
        font-family: "Poppins", sans-serif !important;
      }

      /* ===== DRAG & DROP STYLES ===== */
      .product-card-draggable {
        cursor: grab;
        user-select: none;
      }

      .product-card-draggable:active {
        cursor: grabbing;
      }

      .product-card-draggable.dragging {
        opacity: 0.45;
        transform: scale(0.97);
        transition:
          opacity 0.15s,
          transform 0.15s;
      }

      /* Floating cart drop zone */
      #drag-cart-dropzone {
        position: fixed;
        bottom: 32px;
        right: 32px;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: var(--primary-hover);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        gap: 4px;
        z-index: 9999;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        border: 3px solid transparent;
        pointer-events: none;
        opacity: 0;
        transform: scale(0.8);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease,
          border-color 0.2s,
          background 0.2s;
      }

      #drag-cart-dropzone.visible {
        opacity: 1;
        transform: scale(1);
        pointer-events: all;
      }

      #drag-cart-dropzone.drag-over {
        background: var(--primary);
        border-color: white;
        transform: scale(1.12);
        box-shadow: 0 12px 40px rgba(217, 143, 151, 0.5);
      }

      /* Drag ghost image */
      #drag-ghost {
        position: fixed;
        top: -9999px;
        left: -9999px;
        width: 90px;
        height: 90px;
        border-radius: 12px;
        overflow: hidden;
        z-index: 10000;
        pointer-events: none;
      }

      #drag-ghost img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Success flash animation */
      @keyframes cartFlash {
        0% {
          transform: scale(1.12);
          background: var(--primary);
        }

        50% {
          transform: scale(1.25);
          background: var(--primary-hover);
        }

        100% {
          transform: scale(1);
          background: var(--primary-hover);
        }
      }

      #drag-cart-dropzone.cart-success {
        animation: cartFlash 0.5s ease forwards;
      }

        /* ===== PREMIUM PRELOADER STYLES ===== */
        #kw-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-in-out, visibility 0.6s;
        }
        #kw-preloader.fade-out { opacity: 0; visibility: hidden; }
        .hearts-loader-container { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .hearts-loader-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            color: #b6145d;
            letter-spacing: -1px;
            position: relative;
            z-index: 2;
        }
        .heart-loader-icon {
            position: absolute;
            fill: #c92a2a;
            opacity: 0;
            transform: scale(0);
            animation: popHeart 2s ease-out infinite;
        }
        .heart-1 { top: -20px; left: 15%; width: 20px; animation-delay: 0s; }
        .heart-2 { top: -35px; left: 45%; width: 28px; animation-delay: 0.3s; }
        .heart-3 { top: -15px; left: 75%; width: 18px; animation-delay: 0.6s; }
        .heart-4 { bottom: -20px; left: 30%; width: 16px; animation-delay: 0.9s; }
        .heart-5 { bottom: -25px; left: 70%; width: 22px; animation-delay: 1.2s; }
        .heart-6 { top: -5px; left: -10%; width: 15px; animation-delay: 1.5s; }
        .heart-7 { bottom: 5px; right: -15%; width: 20px; animation-delay: 1.8s; }
        @keyframes popHeart {
            0% { opacity: 0; transform: scale(0) translateY(10px); }
            20% { opacity: 1; transform: scale(1.1) translateY(0); }
            40% { transform: scale(1) translateY(0); }
            70% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0) translateY(-15px); }
        }

        @media (max-width: 640px) {
            .hearts-loader-container {
                transform: scale(0.70);
            }
        }
    </style>

    <script>
        (function () {
            // --- Dismiss preloader on window load ---
            function dismiss() {
                setTimeout(function () {
                    const loader = document.getElementById('kw-preloader');
                    if (loader) {
                        loader.classList.add('fade-out');
                        setTimeout(function () { loader.style.display = 'none'; }, 750);
                    }
                }, 0);
            }
            if (document.readyState === 'complete') {
                dismiss();
            } else {
                window.addEventListener('load', dismiss);
            }
            // Safety fallback: hide after 8 seconds no matter what
            setTimeout(dismiss, 8000);
        })();
    </script>

    <script>
      // --- WhatsApp Form Handler ---
      const whatsappForm = document.getElementById("whatsapp-form");
      if (whatsappForm) {
        whatsappForm.addEventListener("submit", function (event) {
          event.preventDefault();

          const name = document.getElementById("wa-name").value;
          const email = document.getElementById("wa-email").value;
          const message = document.getElementById("wa-message").value;

          // Your WhatsApp number without '+' or spaces
          const phoneNumber = "94713183300";

          // Construct the message with clear labels
          const fullMessage = `New Inquiry from Lovzmart Website:\n\n*Name:* ${name}\n*Email:* ${email}\n\n*Message:*\n${message}`;

          // Encode the message for the URL
          const encodedMessage = encodeURIComponent(fullMessage);

          // Create the WhatsApp click-to-chat URL
          const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

          // Open the URL in a new tab to start the chat
          window.open(whatsappURL, "_blank");
        });
      }
    </script>

      async function setupHeroSlider() {

        try {
          const heroDoc = await getDoc(doc(db, "settings", "homepage_hero"));
          if (heroDoc.exists()) {
            const data = heroDoc.data();
            const slides = [];
            if (data.slide1) slides.push(data.slide1);
            if (data.slide2) slides.push(data.slide2);
            if (data.slide3) slides.push(data.slide3);

            if (slides.length > 0) {
              const wrapper = swiperContainer.querySelector(".swiper-wrapper");
              wrapper.innerHTML = slides
                .map(
                  (url) => `
                            <div class="swiper-slide bg-[#f8f7f2] h-auto">
                                <img src="${url}" class="w-full h-auto object-cover" alt="Hero Banner" />
                            </div>

                )
                .join("");

              // Show slider, hide loader
              swiperContainer.classList.remove("hidden");
              if (loader) loader.classList.add("hidden");

              // Initialize Swiper
              const swiper = new Swiper(".heroSwiper", {
                loop: true,
                effect: "fade",

                autoplay: {

      function setupCategoryAutoSlide() {
        const scroller = document.getElementById("category-scroller");
        if (!scroller) return;
        let slideInterval;
        const startSliding = () => {
          slideInterval = setInterval(() => {
            const firstItem = scroller.querySelector("a");
            if (!firstItem) return;
            const scrollAmount = firstItem.offsetWidth + 16;
            let newScrollLeft = scroller.scrollLeft + scrollAmount;
            if (newScrollLeft + scroller.clientWidth > scroller.scrollWidth) {
              newScrollLeft = 0;
            }
            scroller.scrollTo({ left: newScrollLeft, behavior: "smooth" });
          }, 3000);
        };
        const stopSliding = () => clearInterval(slideInterval);
        scroller.addEventListener("mouseenter", stopSliding);
        scroller.addEventListener("mouseleave", startSliding);
        startSliding();
      }

      function setupFeaturesAutoSlide() {
        const scroller = document.getElementById("features-scroller");
        if (!scroller) return;
        let slideInterval;
        const startSliding = () => {
          slideInterval = setInterval(() => {
            // Only slide on mobile view where horizontal scrolling is active
            if (scroller.scrollWidth <= scroller.clientWidth) return;

            const items = scroller.querySelectorAll(".snap-center");
            if (items.length === 0) return;

            const scrollLeft = scroller.scrollLeft;
            const itemWidth = items[0].offsetWidth || 1;
            let currentIndex = Math.round(scrollLeft / itemWidth);
            let nextIndex = currentIndex + 1;

            if (nextIndex >= items.length) {
              nextIndex = 0;
            }

            scroller.scrollTo({
              left: nextIndex * itemWidth,
              behavior: "smooth",
            });
          }, 3000);
        };
        const stopSliding = () => clearInterval(slideInterval);

        scroller.addEventListener("mouseenter", stopSliding);
        scroller.addEventListener("mouseleave", startSliding);
        scroller.addEventListener("touchstart", stopSliding, { passive: true });
        scroller.addEventListener("touchend", startSliding, { passive: true });
        startSliding();
      }

      async function removeCartDrawerItem(itemId) {
        const user = auth.currentUser;
        if (!user) return;
        const cartItemRef = doc(db, "carts", user.uid, "items", itemId);
        try {
          await deleteDoc(cartItemRef);
        } catch (error) {
          console.error("Error removing cart item:", error);
        }
      }

      async function changeCartDrawerQty(itemId, change) {
        const user = auth.currentUser;
        if (!user) return;
        const cartItemRef = doc(db, "carts", user.uid, "items", itemId);
        try {
          const docSnap = await getDoc(cartItemRef);
          if (docSnap.exists()) {
            const currentQty = docSnap.data().quantity || 1;
            const newQty = currentQty + change;
            if (newQty <= 0) {
              await deleteDoc(cartItemRef);
            } else {
              await updateDoc(cartItemRef, { quantity: newQty });
            }
          }
        } catch (error) {
          console.error("Error changing cart quantity:", error);
        }
      }

      function applyFilters() {
        const sourcePrefix = "mobile";
        const panel = document.getElementById(`${sourcePrefix}-filter-panel`);
        currentFilters = {};
        currentFilters.brands = [
          ...panel.querySelectorAll(
            `#${sourcePrefix}-brand-filter-list input:checked`,
          ),
        ].map((cb) => cb.value);
        currentFilters.categories = [
          ...panel.querySelectorAll(
            `#${sourcePrefix}-category-filter-list input:checked`,
          ),
        ].map((cb) => cb.value);
        currentFilters.sizes = [
          ...panel.querySelectorAll(".size-btn.bg-black"),
        ].map((btn) => btn.dataset.size);
        const minPrice = parseFloat(
          panel.querySelector(`#${sourcePrefix}-min-price`).value,
        );
        if (!isNaN(minPrice)) currentFilters.minPrice = minPrice;
        else delete currentFilters.minPrice;
        const maxPrice = parseFloat(
          panel.querySelector(`#${sourcePrefix}-max-price`).value,
        );
        if (!isNaN(maxPrice)) currentFilters.maxPrice = maxPrice;
        else delete currentFilters.maxPrice;
        toggleMobileFilterSidebar(false);
        loadProducts();
      }

      function clearFilters() {
        currentFilters = {};
        loadProducts();
      }

      function updateFilterUIs() {
        ["mobile", "desktop"].forEach((view) => {
          const panel = document.getElementById(`${view}-filter-panel`);
          if (!panel) return;
          panel.querySelector(`#${view}-min-price`).value =
            currentFilters.minPrice || "";
          panel.querySelector(`#${view}-max-price`).value =
            currentFilters.maxPrice || "";
          panel.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
            cb.checked = false;
          });
          if (currentFilters.brands)
            currentFilters.brands.forEach((b) => {
              const el = panel.querySelector(`input[value="${b}"]`);
              if (el) el.checked = true;
            });
          if (currentFilters.categories)
            currentFilters.categories.forEach((c) => {
              const el = panel.querySelector(`input[value="${c}"]`);
              if (el) el.checked = true;
            });
          panel
            .querySelectorAll(".size-btn")
            .forEach((btn) => btn.classList.remove("bg-black", "text-white"));
          if (currentFilters.sizes)
            currentFilters.sizes.forEach((s) => {
              const el = panel.querySelector(`button[data-size="${s}"]`);
              if (el) el.classList.add("bg-black", "text-white");
            });
        });
      }

      async function loadProducts(isLoadMore = false) {
        if (isLoadMore) isLoadingMore = true;

        try {
          if (!isLoadMore) {
            mainContentArea.innerHTML = "";
            lastVisibleProduct = null;
            hasMoreProducts = true;

            // Display Category Banner if exactly one category is selected
            if (
              currentFilters.categories &&
              currentFilters.categories.length === 1
            ) {
              try {
                const catDoc = await getDoc(
                  doc(db, "categories", currentFilters.categories[0]),
                );
                if (catDoc.exists() && catDoc.data().bannerUrl) {
                  const bannerHtml = `
                                    <div class="w-full mb-6 md:mb-8">
                                        <img src="${catDoc.data().bannerUrl}" class="w-full h-auto object-contain rounded-xl md:rounded-2xl shadow-sm" alt="${currentFilters.categories[0]}">
                                    </div>
                                `;
                  const bannerContainer = document.getElementById(
                    "category-banner-container",
                  );
                  if (bannerContainer) {
                    bannerContainer.innerHTML = bannerHtml;
                  }
                }
              } catch (e) {
                console.error("Error loading category banner:", e);
              }
            } else {
              const bannerContainer = document.getElementById(
                "category-banner-container",
              );
              if (bannerContainer) {
                bannerContainer.innerHTML = "";
              }
            }

            if (isMobileView()) {
              mainContentArea.appendChild(renderMobileHeader());
              const productGrid = document.createElement("div");
              productGrid.id = "filtered-product-grid";
              productGrid.className = "grid grid-cols-2 gap-x-4 gap-y-8 pt-4";
              mainContentArea.appendChild(productGrid);
            } else {
              mainContentArea.appendChild(renderDesktopHeaderAndFilters(true));
              const productGrid = document.createElement("div");
              productGrid.id = "filtered-product-grid";
              productGrid.className =
                "grid grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-10 mt-8";
              mainContentArea.appendChild(productGrid);
            }
          }

          const productGrid = document.getElementById("filtered-product-grid");

          let baseConstraints = [];
          if (currentFilters.brands && currentFilters.brands.length)
            baseConstraints.push(where("brand", "in", currentFilters.brands));
          if (currentFilters.categories && currentFilters.categories.length)
            baseConstraints.push(
              where("category", "in", currentFilters.categories),
            );
          if (currentFilters.sizes && currentFilters.sizes.length)
            baseConstraints.push(
              where("sizes", "array-contains-any", currentFilters.sizes),
            );
          if (currentFilters.minPrice != null)
            baseConstraints.push(where("price", ">=", currentFilters.minPrice));
          if (currentFilters.maxPrice != null)
            baseConstraints.push(where("price", "<=", currentFilters.maxPrice));

          let constraintsWithOrder = [
            ...baseConstraints,
            orderBy(currentSort.field, currentSort.direction),
            limit(20),
          ];
          if (isLoadMore && lastVisibleProduct)
            constraintsWithOrder.splice(2, 0, startAfter(lastVisibleProduct));

          let querySnapshot;
          try {
            querySnapshot = await getDocs(
              query(collection(db, "products"), ...constraintsWithOrder),
            );
          } catch (idxError) {
            console.warn(
              "Firestore index error, falling back to unordered query",
              idxError,
            );
            let constraintsWithoutOrder = [...baseConstraints, limit(20)];
            if (isLoadMore && lastVisibleProduct)
              constraintsWithoutOrder.splice(
                1,
                0,
                startAfter(lastVisibleProduct),
              );
            querySnapshot = await getDocs(
              query(collection(db, "products"), ...constraintsWithoutOrder),
            );
          }

          if (querySnapshot.empty) {
            hasMoreProducts = false;
            if (!isLoadMore)
              productGrid.innerHTML =
                '<p class="col-span-full text-center text-gray-500">No products found.</p>';
          } else {
            lastVisibleProduct =
              querySnapshot.docs[querySnapshot.docs.length - 1];
            if (querySnapshot.docs.length < 20) hasMoreProducts = false;
            querySnapshot.forEach((doc) =>
              productGrid.appendChild(
                createProductCardElement(doc.id, doc.data()),
              ),
            );
          }
        } catch (error) {
          console.error("Error loading products:", error);
          if (!isLoadMore) {
            const productGrid = document.getElementById(
              "filtered-product-grid",
            );
            if (productGrid) {
              productGrid.innerHTML =
                '<p class="col-span-full text-center text-red-500">Failed to load products.</p>';
            } else {
              mainContentArea.innerHTML =
                '<p class="text-center text-red-500">Failed to load products.</p>';
            }
          }
        } finally {
          if (!isLoadMore) updateFilterUIs();
        }
      }

      function generateStars(rating = 0) {
        let starsHTML = "";
        for (let i = 1; i <= 5; i++) {
          if (i <= rating) {
            starsHTML += starFilledIcon;
          } else {
            starsHTML += starEmptyIcon;
          }
        }
        return starsHTML;
      }

      function createProductCardElement(productId, product) {
        const cardWrapper = document.createElement("div");
        cardWrapper.className = "product-card-draggable";
        const isWishlisted = wishlistedProductIds.has(productId);

        const imageUrls = product.imageUrls || [];
        const primaryImage =
          imageUrls[0] ||
          product.imageUrl ||
          "https://placehold.co/400x500/f0f0f0/666?text=No+Image";
        const hoverImage = imageUrls[1] || primaryImage;

        const rating = product.rating || (Math.random() * 2 + 3).toFixed(1);
        const reviewCount =
          product.reviewCount || Math.floor(Math.random() * 50) + 1;
        const oldPrice = product.oldPrice || product.price * 1.25;

        cardWrapper.innerHTML = `
            <div class="group relative overflow-hidden bg-[#f8f7f2] aspect-[3/4] rounded-2xl">
                <a href="product-detail.html?id=${productId}" class="w-full h-full block">
                    <img src="${primaryImage}" alt="${product.name}" class="product-card-image w-full h-full object-cover transition-all duration-500 group-hover:scale-105">
                </a>
                <button class="wishlist-btn absolute top-3 right-3 p-1.5 rounded-full text-gray-600 hover:text-red-500 transition-colors" data-product-id="${productId}">
                    ${isWishlisted ? heartIconFilled : heartIconEmpty}
                </button>
            </div>
            <div class="mt-4 px-1 flex flex-col items-center text-center">
                 <a href="product-detail.html?id=${productId}" class="text-[13px] text-gray-700 hover:text-black transition-colors leading-tight mb-1 font-medium">${product.name}</a>
                 <div class="flex items-center justify-center gap-1 mb-1">
                     ${generateStars(5)}
                 </div>
                 <p class="text-[14px] font-bold text-gray-900">Rs. ${product.price.toLocaleString()}</p>
            </div>`;

        const imageContainer = cardWrapper.querySelector(".group");
        const imageElement = cardWrapper.querySelector(".product-card-image");

        if (primaryImage !== hoverImage) {
          imageContainer.addEventListener("mouseenter", () => {
            imageElement.src = hoverImage;
            imageElement.classList.add("scale-105");
          });

          imageContainer.addEventListener("mouseleave", () => {
            imageElement.src = primaryImage;
            imageElement.classList.remove("scale-105");
          });
        }

        // ====== DRAG & DROP LOGIC ======
        cardWrapper.setAttribute("draggable", "true");
        cardWrapper.dataset.productId = productId;
        cardWrapper.dataset.productName = product.name;
        cardWrapper.dataset.productPrice = product.price;
        cardWrapper.dataset.productImage = primaryImage;

        cardWrapper.addEventListener("dragstart", (e) => {
          // Set drag ghost image
          const ghost = document.getElementById("drag-ghost-img");
          if (ghost) ghost.src = primaryImage;
          const ghostEl = document.getElementById("drag-ghost");
          if (ghostEl) e.dataTransfer.setDragImage(ghostEl, 45, 45);

          e.dataTransfer.setData("text/plain", productId);
          e.dataTransfer.setData(
            "application/x-product",
            JSON.stringify({
              id: productId,
              name: product.name,
              price: product.price,
              imageUrl: primaryImage,
            }),
          );
          e.dataTransfer.effectAllowed = "copy";

          setTimeout(() => {
            cardWrapper.classList.add("dragging");
            const dropzone = document.getElementById("drag-cart-dropzone");
            if (dropzone) dropzone.classList.add("visible");
          }, 0);
        });

        cardWrapper.addEventListener("dragend", () => {
          cardWrapper.classList.remove("dragging");
          const dropzone = document.getElementById("drag-cart-dropzone");
          if (dropzone) {
            dropzone.classList.remove("visible", "drag-over");
          }
        });

        return cardWrapper;
      }

      // ====== SETUP CART DROPZONE ======
      function setupCartDropzone() {
        const dropzone = document.getElementById("drag-cart-dropzone");
        if (!dropzone) return;

        dropzone.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
          dropzone.classList.add("drag-over");
        });

        dropzone.addEventListener("dragleave", () => {
          dropzone.classList.remove("drag-over");
        });

        dropzone.addEventListener("drop", async (e) => {
          e.preventDefault();
          dropzone.classList.remove("drag-over");

          const user = auth.currentUser;
          if (!user) {
            authModal.classList.remove("hidden");
            dropzone.classList.remove("visible");
            return;
          }

          let productData;
          try {
            productData = JSON.parse(
              e.dataTransfer.getData("application/x-product"),
            );
          } catch {
            dropzone.classList.remove("visible");
            return;
          }

          // Add to Firestore cart (default size S if not specified)
          const cartItemRef = doc(
            db,
            "carts",
            user.uid,
            "items",
            `${productData.id}_drag`,
          );
          try {
            const existing = await getDoc(cartItemRef);
            if (existing.exists()) {
              await updateDoc(cartItemRef, {
                quantity: (existing.data().quantity || 1) + 1,
              });
            } else {
              await setDoc(cartItemRef, {
                productId: productData.id,
                name: productData.name,
                price: Number(productData.price),
                imageUrl: productData.imageUrl,
                size: "One Size",
                quantity: 1,
                addedAt: new Date(),
              });
            }
            // Success flash animation
            dropzone.classList.add("cart-success");
            setTimeout(() => {
              dropzone.classList.remove("cart-success", "visible");
            }, 600);

            // Open cart drawer
            setTimeout(() => toggleCartDrawer(true), 700);
          } catch (err) {
            console.error("Drag-to-cart error:", err);
            dropzone.classList.remove("visible");
          }
        });
      }

      function updateAllWishlistIcons() {
        document.querySelectorAll(".wishlist-btn").forEach((btn) => {
          const productId = btn.dataset.productId;
          const isWishlisted = wishlistedProductIds.has(productId);
          btn.innerHTML = isWishlisted ? heartIconFilled : heartIconEmpty;
        });
      }

      async function toggleWishlistItem(productId) {
        const user = auth.currentUser;
        if (!user) {
          authModal.classList.remove("hidden");
          return;
        }
        const wishlistRef = doc(db, "wishlists", user.uid, "items", productId);
        try {
          if (wishlistedProductIds.has(productId)) {
            await deleteDoc(wishlistRef);
          } else {
            const productRef = doc(db, "products", productId);
            const productSnap = await getDoc(productRef);
            if (productSnap.exists()) {
              await setDoc(wishlistRef, {
                ...productSnap.data(),
                addedAt: new Date(),
              });
            }
          }
        } catch (error) {
          console.error("Error updating wishlist:", error);
        }
      }

      onAuthStateChanged(auth, (user) => {
        if (user) {
          listenToUserData(user.uid);
          userText.textContent = "My Account";
        } else {
          if (wishlistListener) wishlistListener();
          if (cartListener) cartListener();
          wishlistedProductIds.clear();
          updateAllWishlistIcons();
          document.getElementById("cart-count").classList.add("hidden");
          updateCartDrawerUI([]);
          userText.textContent = "Log in / Register";
        }
      });

      function listenToUserData(userId) {
        const wishlistRef = collection(db, "wishlists", userId, "items");
        wishlistListener = onSnapshot(wishlistRef, (snapshot) => {
          wishlistedProductIds = new Set(snapshot.docs.map((doc) => doc.id));
          updateAllWishlistIcons();
        });
        const cartRef = collection(db, "carts", userId, "items");
        cartListener = onSnapshot(cartRef, (snapshot) => {
          const count = snapshot.size;
          const cartCountEl = document.getElementById("cart-count");
          cartCountEl.textContent = count;
          cartCountEl.classList.toggle("hidden", count === 0);

          const cartItems = snapshot.docs.map((doc) => ({
            id: doc.id,
            ...doc.data(),
          }));
          updateCartDrawerUI(cartItems);
        });
      }

      function setupAuthModal() {
        const loginTab = authModal.querySelector("#login-tab");
        const signupTab = authModal.querySelector("#signup-tab");
        const loginForm = authModal.querySelector("#login-form");
        const signupForm = authModal.querySelector("#signup-form");
        const googleBtn = authModal.querySelector("#google-signin-btn");
        const authError = authModal.querySelector("#auth-error");

        userButton.addEventListener("click", () => {
          if (auth.currentUser) {
            window.location.href = "my-orders.html";
          } else {
            authModal.classList.remove("hidden");
          }
        });
        authModal.addEventListener("click", (e) => {
          if (e.target === authModal) authModal.classList.add("hidden");
        });
        document
          .getElementById("close-auth-modal")
          ?.addEventListener("click", () => authModal.classList.add("hidden"));

        loginTab.addEventListener("click", () => {
          loginTab.classList.add("bg-gray-50", "text-black");
          loginTab.classList.remove("bg-white", "text-gray-400");
          signupTab.classList.add("bg-white", "text-gray-400");
          signupTab.classList.remove("bg-gray-50", "text-black");
          document
            .getElementById("login-indicator")
            .classList.replace("bg-transparent", "bg-black");
          document
            .getElementById("signup-indicator")
            .classList.replace("bg-black", "bg-transparent");
          document.getElementById("auth-title").textContent = "Welcome Back";
          document.getElementById("auth-subtitle").textContent =
            "Enter your details to access your account.";
          loginForm.classList.remove("hidden");
          signupForm.classList.add("hidden");
        });
        signupTab.addEventListener("click", () => {
          signupTab.classList.add("bg-gray-50", "text-black");
          signupTab.classList.remove("bg-white", "text-gray-400");
          loginTab.classList.add("bg-white", "text-gray-400");
          loginTab.classList.remove("bg-gray-50", "text-black");
          document
            .getElementById("signup-indicator")
            .classList.replace("bg-transparent", "bg-black");
          document
            .getElementById("login-indicator")
            .classList.replace("bg-black", "bg-transparent");
          document.getElementById("auth-title").textContent = "Create Account";
          document.getElementById("auth-subtitle").textContent =
            "Join Lovzmart today.";
          signupForm.classList.remove("hidden");
          loginForm.classList.add("hidden");
        });

        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          authError.textContent = "";
          try {
            await signInWithEmailAndPassword(
              auth,
              loginForm["login-email"].value,
              loginForm["login-password"].value,
            );
            authModal.classList.add("hidden");
          } catch (error) {
            authError.textContent = error.message;
          }
        });
        signupForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          authError.textContent = "";
          try {
            await createUserWithEmailAndPassword(
              auth,
              signupForm["signup-email"].value,
              signupForm["signup-password"].value,
            );
            authModal.classList.add("hidden");
          } catch (error) {
            authError.textContent = error.message;
          }
        });
        googleBtn.addEventListener("click", async () => {
          authError.textContent = "";
          try {
            await signInWithPopup(auth, new GoogleAuthProvider());
            authModal.classList.add("hidden");
          } catch (error) {
            authError.textContent = error.message;
          }
        });
      }

      function setupStickyScroll() {
        if (isMobileView()) return;

        const productContainer = document.querySelector(
          "#product-grid-container",
        );
        const mainContent = document.querySelector("main");

        if (!productContainer || !mainContent) return;

        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              document.body.classList.remove("no-scroll");
            } else if (entry.boundingClientRect.top < 0) {
              document.body.classList.add("no-scroll");
            }
          },
          { threshold: [0] },
        );

        observer.observe(productContainer);

        mainContent.addEventListener("scroll", () => {
          const isAtTop = mainContent.scrollTop === 0;
          const isAtBottom =
            mainContent.scrollHeight - mainContent.scrollTop <=
            mainContent.clientHeight + 1;

          if (document.body.classList.contains("no-scroll")) {
            if (isAtTop || isAtBottom) {
              document.body.classList.remove("no-scroll");
            }
          }
        });
      }

      async function loadNewArrivals() {
        const strip = document.getElementById("new-arrivals-strip");
        if (!strip) return;
        try {
          const q = query(
            collection(db, "products"),
            orderBy("createdAt", "desc"),
          );
          const snap = await getDocs(q);
          if (snap.empty) {
            strip.innerHTML =
              '<p class="text-gray-400 text-sm">No new arrivals yet.</p>';
            return;
          }
          strip.innerHTML = "";
          let count = 0;
          snap.forEach((docSnap) => {
            if (count >= 8) return; // show max 8
            const p = { id: docSnap.id, ...docSnap.data() };
            const imageUrls = p.imageUrls || [];
            const img =
              imageUrls[0] ||
              p.imageUrl ||
              "https://placehold.co/400x500/f0f0f0/666?text=No+Image";
            const card = document.createElement("a");
            card.href = `product-detail.html?id=${p.id}`;
            card.className = "flex-shrink-0 w-48 md:w-56 group";
            card.innerHTML = `
                    <div class="w-full aspect-[3/4] bg-[#f8f7f2] rounded-lg overflow-hidden">
                        <img src="${img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="mt-3 px-1">
                        <p class="text-[13px] font-medium text-gray-800 hover:text-black leading-tight truncate">${p.name}</p>
                        <p class="text-[14px] font-bold text-gray-900 mt-1">Rs. ${p.price ? p.price.toLocaleString() : "—"}</p>
                    </div>`;
            strip.appendChild(card);
            count++;
          });
        } catch (e) {
          console.error("Error loading new arrivals:", e);
          const strip = document.getElementById("new-arrivals-strip");
          if (strip)
            strip.innerHTML =
              '<p class="text-gray-400 text-sm">Failed to load.</p>';
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        setupAuthModal();

        // Check for category in URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get("category");
        if (categoryParam) {
          currentFilters = { categories: [categoryParam] };
          const shopTitle = document.getElementById("shop-title");
          if (shopTitle) shopTitle.textContent = categoryParam;
        } else {
          const shopTitle = document.getElementById("shop-title");
          if (shopTitle) shopTitle.textContent = "Shop All";
        }

        await populateFilterOptions();

        if (categoryParam) {
          updateFilterUIs();
        }

        if (!isMobileView()) {
          setupStickyScroll();
        }

        loadProducts();
        setupCartDropzone();

        // Infinite scroll listener
        window.addEventListener("scroll", async () => {
          if (isLoadingMore || !hasMoreProducts) return;
          // Load more when user scrolls to bottom 500px
          if (
            window.innerHeight + window.scrollY >=
            document.body.offsetHeight - 500
          ) {
            isLoadingMore = true;
            await loadProducts(true);
            isLoadingMore = false;
          }
        });

        const searchHandler = (e) => {
          e.preventDefault();
          const input = e.target.querySelector('input[type="text"]');
          const searchTerm = input ? input.value.trim().toLowerCase() : "";
          if (searchTerm) {
            // If they search for something, filter locally (rudimentary)
            // We'd ideally need a text search, but for now let's just alert
            alert(
              `Search feature is coming soon! You searched for: ${searchTerm}`,
            );
          }
        };

        const desktopForm = document.getElementById("desktop-search-form");
        if (desktopForm) desktopForm.addEventListener("submit", searchHandler);

        const mobileForm = document.getElementById("mobile-search-form");
        if (mobileForm) mobileForm.addEventListener("submit", searchHandler);

        ["desktop", "mobile"].forEach((view) => {
          const panel = document.getElementById(`${view}-filter-panel`);
          if (!panel) return;
          const sizeTabs = panel.querySelectorAll(".size-tab");
          const sizePanels = panel.querySelectorAll(".tab-panel");
          sizeTabs.forEach((tab) => {
            tab.addEventListener("click", () => {
              sizeTabs.forEach((t) =>
                t.classList.remove("border-teal-500", "text-teal-600"),
              );
              tab.classList.add("border-teal-500", "text-teal-600");
              sizePanels.forEach((p) => p.classList.remove("active"));
              panel
                .querySelector(`[data-panel="${tab.dataset.tab}"]`)
                .classList.add("active");
            });
          });
          panel.querySelectorAll(".size-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              btn.classList.toggle("bg-black");
              btn.classList.toggle("text-white");
            });
          });
          panel
            .querySelector(`#${view}-apply-filters-btn`)
            .addEventListener("click", applyFilters);
          panel
            .querySelector(`#${view}-clear-filters-btn`)
            .addEventListener("click", clearFilters);
        });

        closeFilterBtn.addEventListener("click", () =>
          toggleMobileFilterSidebar(false),
        );
        mobileFilterSidebar.addEventListener("click", (e) => {
          if (e.target === mobileFilterSidebar)
            toggleMobileFilterSidebar(false);
        });

        const mobileMenuBtn = document.getElementById("mobile-menu-btn");
        if (mobileMenuBtn) {
          mobileMenuBtn.addEventListener("click", () =>
            toggleMobileNavDrawer(true),
          );
        }

        const mobileNavDrawer = document.getElementById("mobile-nav-drawer");
        if (mobileNavDrawer) {
          mobileNavDrawer.addEventListener("click", (e) => {
            if (e.target === mobileNavDrawer) toggleMobileNavDrawer(false);
          });
        }

        const cartButton = document.getElementById("cart-button");
        if (cartButton) {
          cartButton.addEventListener("click", () => {
            if (!auth.currentUser) {
              authModal.classList.remove("hidden");
            } else {
              toggleCartDrawer(true);
            }
          });
        }

        const cartDrawer = document.getElementById("cart-drawer");
        if (cartDrawer) {
          cartDrawer.addEventListener("click", (e) => {
            if (e.target === cartDrawer) toggleCartDrawer(false);
          });
        }

        mainContentArea.addEventListener("click", (e) => {
          const wishlistBtn = e.target.closest(".wishlist-btn");
          if (wishlistBtn) toggleWishlistItem(wishlistBtn.dataset.productId);
        });
      });
    </script>
